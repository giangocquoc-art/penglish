    <script>
      (() => {
        if (!("serviceWorker" in navigator)) return;

        const isProd = "production" === "production";
        const devCleanupKey = "luyentu-dev-sw-cleaned";
        const cleanupDevServiceWorkers = async () => {
          try {
            const registrations =
              await navigator.serviceWorker.getRegistrations();
            const hadRegistrations = registrations.length > 0;

            if (navigator.serviceWorker.controller) {
              navigator.serviceWorker.controller.postMessage({
                type: "CLEAR_CACHE",
              });
            }

            await Promise.all(
              registrations.map((registration) => registration.unregister()),
            );

            if ("caches" in window) {
              const cacheKeys = await caches.keys();
              await Promise.all(
                cacheKeys
                  .filter((key) => key.startsWith("luyentu-cache-"))
                  .map((key) => caches.delete(key)),
              );
            }

            if (hadRegistrations && !sessionStorage.getItem(devCleanupKey)) {
              sessionStorage.setItem(devCleanupKey, "1");
              window.location.reload();
              return;
            }

            sessionStorage.removeItem(devCleanupKey);
          } catch (error) {
            console.log("SW cleanup failed in dev:", error);
          }
        };

        if (!isProd) {
          cleanupDevServiceWorkers();
          return;
        }

        window.addEventListener("load", () => {
          sessionStorage.removeItem(devCleanupKey);

          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) => {
              console.log("SW registered:", registration.scope);
            })
            .catch((error) => {
              console.log("SW registration failed:", error);
            });
        });
      })();
    </script>
